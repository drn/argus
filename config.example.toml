# ~/.config/argus/config.toml

[defaults]
backend = "claude"

[backends.claude]
command = "claude --dangerously-skip-permissions"
prompt_flag = "-p"

[backends.codex]
command = "codex --quiet"
prompt_flag = ""

[backends.custom]
command = "aider"
prompt_flag = "--message"

[projects.api]
path = "~/code/thanx/api"
branch = "main"
backend = "claude"           # override default

[projects.web]
path = "~/code/thanx/web"
branch = "main"

[projects.dots]
path = "~/.dots"
branch = "master"

[keybindings]
new = "n"
attach = "enter"
status = "s"
delete = "d"
quit = "q"
help = "?"
filter = "/"
prompt = "p"
worktree = "w"

[ui]
theme = "default"
show_elapsed = true
show_icons = true
